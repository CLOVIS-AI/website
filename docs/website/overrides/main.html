{% extends "base.html" %}

{% block htmltitle %}
	{% if page.toc | first is defined %}
		<title>{{ page.toc.items[0].title }} - {{ config.site_name }}</title>
	{% else %}
		{{ super() }}
	{% endif %}
{% endblock %}

{% block announce %}
	<b>Do you like my projects?</b>    Follow me on <a href="https://github.com/clovis-ai">GitHub</a>!
{% endblock %}
